Rules:
  - Name: Warp Stalled by L1TEX Long Scoreboard
    Category: SM Warp Latency
    Explanation: "Percentage of cumulative warp cycles for warps waiting on a dependency on a memory read from:\n- textures or buffers (SRVs)\n- surfaces (UAVs or ROVs)\n- local or global memory"
    Suggestion: "Go to the Input Dependency panel of the Shader Profiler and locate the most-expensive L1TEX load instructions.  \n* Try better hiding the latency of the L1TEX instructions:  \n  - With other math instructions: try hoisting L1TEX instructions (i.e.: prefetch: move the texture fetches so they happen earlier in the program)  \n  - With other L1TEX instructions: try batching likely hits (e.g. by grouping independent texture fetches in batches of 2 to 4 back-to-back instructions at the HLSL level)  \n  - Removing unnecessary control flow that prevents L1TEX instructions from being batched\n* Try reducing the latencies of the L1TEX instructions:  \n  - Consider using more compact texture formats and/or reducing texture sizes\n  - Consider using Buffer SRV Loads instead of Buffer UAV Loads  \n  - Consider removing indirections in buffer accesses to reduce chains of dependent loads\n  - If you are doing path tracing, consider disabling anisotropic filtering globally, as that should not degrade image quality"
    RangeSpeedupFactor: 1.0467450073344615
    FrameGain: 4.465749251911677
    Metrics:
      - Name: Warps Issue Stalled Long Scoreboard L1 [%]
        Id: smsp__warps_issue_stalled_long_scoreboard_pipe_l1tex.avg.pct_of_peak_sustained_elapsed
        Description: Cumulative warp latency cycles for warps waiting for a scoreboard dependency on a L1TEX (local, global, surface, tex) operation
        Value: 4.4657
      - Name: L2 Hit Rate [%]
        Id: lts__t_sector_hit_rate.pct
        Description: Percentage of total L2 sector accesses that hit
        Value: 73.6165
  - Name: Warp Stalled by No Instruction
    Category: SM Warp Latency
    Explanation: Percentage of cumulative warp cycles for warps waiting to be selected for instruction fetch, or waiting on an instruction cache miss.
    Suggestion: "Reducing the number of SASS instructions per shader may help (for instance, by not unrolling certain loops).  \nReducing the number of active shaders may help (for instance, by doing lighting in a raygen shader instead of in hit shaders).  \nReducing ray-latency divergence may help, for instance by using Shader Execution Reordering (SER).  \nNote: As long as the instructions that are never hit are in large chunks, they should not take up space in the SM instruction cache."
    RangeSpeedupFactor: 1.0196243779464993
    FrameGain: 1.9246673942832082
    Metrics:
      - Name: Warps Issue Stalled No Instruction [%]
        Id: smsp__warps_issue_stalled_no_instruction.avg.pct_of_peak_sustained_elapsed
        Description: Cumulative warp latency cycles for warps waiting to be selected for instruction fetch, or waiting on an instruction cache miss
        Value: 1.9247
  - Name: Warp Stalled by TEX Throttle
    Category: SM Warp Latency
    Explanation: "Percentage of cumulative warp cycles for warps stalled due to the TEX input queue being full.  \nThe SM texture pipeline forwards texture (SRV) and surface (UAV) instructions to the L1TEX unit's TEXIN stage.  \nOn GPUs where FP64 or Tensor pipelines are decoupled, the texture pipeline forwards those types of instructions, too."
    Suggestion: "Go to the Shader Profiler and locate which HLSL instructions are getting most of the tex_throttle stalls.  \nTry sinking L1TEX instructions (i.e.: move the texture fetches within branches, to reduce the number of executed texture instructions).  \nTry reducing the latencies of the L1TEX instructions (see Warp Stalled by Long Scoreboard)."
    RangeSpeedupFactor: 1.0028677049646835
    FrameGain: 0.28595047487189884
    Metrics:
      - Name: Warps Issue Stalled TEX Throttle [%]
        Id: smsp__warps_issue_stalled_tex_throttle.avg.pct_of_peak_sustained_elapsed
        Description: Cumulative warp latency cycles for warps waiting for a free entry in the TEX instruction queue
        Value: 0.2860
      - Name: L2 Hit Rate [%]
        Id: lts__t_sector_hit_rate.pct
        Description: Percentage of total L2 sector accesses that hit
        Value: 73.6165
  - Name: Warp Stalled by MIO Throttle
    Category: SM Warp Latency
    Explanation: "Percentage of cumulative warp cycles for warps stalled due to the MIO input queue being full.  \nMIO throttle is a superset of LG (Local/Global Memory) throttle. See LG throttle.  \nOther types of instruction to MIO beyond LG include shared memory, shuffle, and indexed constant-buffer loads."
    Suggestion: Go to the Shader Profiler and locate which HLSL instructions are getting most of the mio_throttle stalls.
    RangeSpeedupFactor: 1.0027578103562267
    FrameGain: 0.27502257551571541

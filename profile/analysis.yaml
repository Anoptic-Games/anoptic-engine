  - Name: SM Throughputs
    Category: Throughputs
    Explanation: "SM pipes on GA10X and AD10X:  \n- adu: Computed branches and indexed constants\n- alu: INT32 except multiply; FP32 comparison\n- cbu: Divergent branches and control flow\n- fma: FP32 mul/add, FP16 mul/add\n- fmaheavy: FP32 mul/add and INT32 multiply\n- fp64: FP64 mul/add\n- ipa: Pixel shader attribute interpolation\n- lsu: Global, local, shared memory, and misc\n- tensor: Tensor matrix multiply (FP16, INT8/4/1)\n- tex: Texture and surface memory\n- uniform: Warp-level scalar operations\n- xu: Transcendentals and float/int conversion"
    Suggestion: Look at the top SM throughput metric and remove work from its associated pipe to get a speedup.
    Metrics:
      - Name: SM Inst Executed [%]
        Id: sm__inst_executed_realtime.avg.pct_of_peak_sustained_elapsed
        Description: Percentage of max warp instructions executed per cycle
        Value: 28.7656
      - Name: SM Pipe ALU [%]
        Id: sm__inst_executed_pipe_alu_realtime.avg.pct_of_peak_sustained_elapsed
        Description: Percentage of max warp instructions executed per cycle for the ALU pipe. The ALU pipe is responsible for execution of most bit manipulation and logic instructions (e.g. FP32 min/max). It also executes integer instructions, excluding IMAD and IMUL. On NVIDIA Ampere architecture chips, the ALU pipeline performs fast FP32-to-FP16 conversion.
        Value: 18.3697
      - Name: SM Pipe SFU [%]
        Id: sm__inst_executed_pipe_xu_realtime.avg.pct_of_peak_sustained_elapsed
        Description: Percentage of max warp instructions executed per cycle for the SFU pipe. The SFU/XU pipe can execute transcendental math operations (rsqrt, cos/sin, etc.) or int-to-float / float-to-int conversions.
        Value: 11.7339
      - Name: SM Pipe FMA Active [%]
        Id: sm__pipe_fma_cycles_active.avg.pct_of_peak_sustained_elapsed
        Description: Number of cycles where fma pipes were active
        Value: 11.3953
      - Name: SM Pipe FMA Heavy [%]

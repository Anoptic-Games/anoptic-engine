  - Name: SM Warp Occupancy (HW)
    Category: Overview
    Explanation: "NVIDIA Ampere RTX GPUs have up to 48 warp slots per SM.  \nNVIDIA Turing RTX GPUS have up to 32 warp slots per SM.  \nSee https://developer.nvidia.com/blog/optimizing-vk-vkr-and-dx12-dxr-applications-using-nsight-graphics-gpu-trace-advanced-mode-metrics/ and https://www.gdcvault.com/browse/gdc-19/play/1026202."
    Suggestion: "Do not worry about warp occupancy unless SM Instruction Throughput is low.  \nFewer than 4 warps on an SM is a starvation condition; launch bigger workloads.  \nHigher is not always better.  16 warps/SM is enough to fully hide math pipe latency.  \nThe following strategies may be used to increase the SM warp occupancy:\n- Reducing the SM warp launch stall reasons (see the SM Warp Occupancy section), typically register pressure\n- Overlapping this workload with an indepedendent SM workload by using an Asynchronous Compute queue (for DX12 or VK)\n- Reducing the number of DX12 ResouceBarriers or VK vkCmdPipelineBarrier commands"
    Metrics:
      - Name: Active Warps per Cycle All
        Id: sm__warps_active.avg.per_cycle_elapsed
        Description: Percentage of SM warp slots occupied by a resident warp
        Value: 15.9455

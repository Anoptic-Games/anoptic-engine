# Sandbox test suites on every PR and branch push. Secretless: substitution comes from
# the flake's own nixConfig (public cache, read-only), nothing is pushed — safe on fork
# PRs and spends no cachix quota. Main-push release builds live in cachix.yml.
name: tests

on:
  pull_request:
  push:
    branches-ignore: [main]

# Force-pushes supersede in-flight runs instead of queueing behind them.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Pure evaluation across all systems — catches flake breakage before any compile.
  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - run: nix flake check

  # Building a suite runs it: ctest lives in the derivation's checkPhase.
  suites:
    needs: flake-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suite: tests-headless
          - os: ubuntu-latest
            suite: tests-asan
          - os: ubuntu-latest
            suite: tests-tsan
          # Renderer suite under Xvfb; Vulkan device tests skip by design (no GPU).
          - os: ubuntu-latest
            suite: tests-full
          - os: macos-latest
            suite: tests-headless
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - run: nix build .#${{ matrix.suite }} --no-link -L
